<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bearded Trader - Live</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --card: #1a1a24;
            --accent: #f7931a;
            --success: #00d26a;
            --danger: #ff4757;
            --text: #fff;
            --text2: #8b8b9e;
            --border: rgba(255,255,255,0.08);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 30px;
            z-index: 100;
        }
        
        nav a {
            color: var(--text2);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        nav a:hover { color: var(--text); background: var(--card); }
        nav a.active { color: var(--text); background: var(--accent); }
        
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
        
        main { padding: 80px 30px 30px; max-width: 1200px; margin: 0 auto; }
        
        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(0, 210, 106, 0.15);
            border-radius: 50px;
            font-size: 0.8rem;
        }
        
        .live-badge .dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-card .value.green { color: var(--success); }
        .stat-card .value.red { color: var(--danger); }
        .stat-card .value.accent { color: var(--accent); }
        
        .stat-card .label {
            color: var(--text2);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Balance Hero */
        .balance-hero {
            background: linear-gradient(135deg, rgba(247, 147, 26, 0.15), rgba(0, 210, 106, 0.05));
            border: 1px solid rgba(247, 147, 26, 0.2);
            border-radius: 20px;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-bottom: 30px;
        }
        
        .balance-item { text-align: center; }
        .balance-item .label { color: var(--text2); font-size: 0.85rem; margin-bottom: 8px; }
        .balance-item .value { font-size: 2.5rem; font-weight: 700; }
        .balance-item .value.accent { color: var(--accent); }
        
        /* Charts */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
        
        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text2);
        }
        
        /* Trade History */
        .trade-item {
            background: var(--bg2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .trade-item .pair {
            font-weight: 600;
            min-width: 100px;
        }
        
        .trade-item .dir {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .trade-item .dir.long { background: rgba(0, 210, 106, 0.2); color: var(--success); }
        .trade-item .dir.short { background: rgba(255, 71, 87, 0.2); color: var(--danger); }
        
        .trade-item .prices {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text2);
        }
        
        .trade-item .prices span { color: var(--text); }
        
        .trade-item .pnl {
            font-weight: 700;
            min-width: 80px;
            text-align: right;
        }
        
        .trade-item .pnl.win { color: var(--success); }
        .trade-item .pnl.loss { color: var(--danger); }
        
        .trade-item .result {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .trade-item .result.win { background: rgba(0, 210, 106, 0.2); color: var(--success); }
        .trade-item .result.loss { background: rgba(255, 71, 87, 0.2); color: var(--danger); }
        
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text2);
            font-size: 0.8rem;
        }
        
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .balance-hero { grid-template-columns: 1fr; }
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🧔 Bearded Trader</span>
        <a href="index.html">Dashboard</a>
        <a href="active.html" class="active">Active Trades</a>
        <a href="history.html">History</a>
        <div class="live-badge" style="margin-left: auto;">
            <span class="dot"></span>
            LIVE
        </div>
    </nav>
    
    <main>
        <!-- Stats Row -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value accent" id="balance">$100.00</div>
                <div class="label">Balance</div>
            </div>
            <div class="stat-card">
                <div class="value" id="pnl">$0.00</div>
                <div class="label">Total P&L</div>
            </div>
            <div class="stat-card">
                <div class="value" id="wr">--%</div>
                <div class="label">Win Rate</div>
            </div>
            <div class="stat-card">
                <div class="value" id="trades">0</div>
                <div class="label">Total Trades</div>
            </div>
        </div>
        
        <!-- Active Trades -->
        <div class="card" style="margin-bottom: 20px;">
            <h2>⚡ Active Trades</h2>
            <div id="activeTrades">
                <div style="text-align: center; padding: 40px; color: var(--text2);">
                    Loading...
                </div>
            </div>
        </div>
        
        <!-- Chart + Quick Stats -->
        <div class="content-grid">
            <div class="card">
                <h2>📈 Balance History</h2>
                <canvas id="chart" height="200"></canvas>
            </div>
            <div class="card">
                <h2>💰 Quick Stats</h2>
                <div id="quickStats">
                    <div style="color: var(--text2);">Loading...</div>
                </div>
            </div>
        </div>
        
        <!-- Recent Trades -->
        <div class="card">
            <h2>📋 Recent Trades</h2>
            <div id="recentTrades">
                <div style="color: var(--text2); text-align: center; padding: 40px;">Loading...</div>
            </div>
        </div>
    </main>
    
    <footer>
        🧔 Bearded Trader v6 • Scanning BTC, BNB, ETH • Sun-Thu 10:00-00:00 Israel
    </footer>
    
    <script>
        const GIST_URL = 'https://gist.githubusercontent.com/rondangur-source/c750c53b60430cd38cc5793c9efd0e7e/raw/dashboard-data.json?t=' + Date.now();
        
        let chart;
        
        async function load() {
            try {
                const res = await fetch(GIST_URL);
                const data = await res.json();
                updateUI(data);
            } catch (e) {
                console.error(e);
            }
        }
        
        function updateUI(data) {
            const stats = data.stats || {};
            const active = data.activeTrades || [];
            const recent = data.recentTrades || [];
            const history = data.balanceHistory || [];
            
            // Stats
            document.getElementById('balance').textContent = '$' + (stats.balance || 100).toFixed(2);
            
            const pnl = stats.totalPnL || 0;
            const pnlEl = document.getElementById('pnl');
            pnlEl.textContent = (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toFixed(2);
            pnlEl.className = 'value ' + (pnl >= 0 ? 'green' : 'red');
            
            document.getElementById('wr').textContent = (stats.winRate || 0) + '%';
            document.getElementById('trades').textContent = stats.totalTrades || 0;
            
            // Active Trades
            const activeContainer = document.getElementById('activeTrades');
            if (active.length === 0) {
                activeContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text2);">No active trades</div>';
            } else {
                activeContainer.innerHTML = active.map(t => `
                    <div class="trade-item">
                        <div class="pair">${t.pair}</div>
                        <div class="dir ${(t.direction||'').toLowerCase()}">${t.direction || 'LONG'}</div>
                        <div class="prices">
                            Entry: <span>$${t.entryPrice?.toFixed(2)}</span> | 
                            SL: <span>$${t.stopLoss?.toFixed(2)}</span> | 
                            TP: <span>$${t.takeProfit?.toFixed(2)}</span>
                        </div>
                        <div class="pnl">--</div>
                        <div class="result" style="background: rgba(255,193,7,0.2); color: #ffc107;">OPEN</div>
                    </div>
                `).join('');
            }
            
            // Quick Stats
            const quickStats = document.getElementById('quickStats');
            quickStats.innerHTML = `
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                    <span style="color: var(--text2);">Wins</span>
                    <span style="color: var(--success);">${stats.wins || 0}</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                    <span style="color: var(--text2);">Losses</span>
                    <span style="color: var(--danger);">${stats.losses || 0}</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                    <span style="color: var(--text2);">Gross Profit</span>
                    <span style="color: var(--success);">$${(stats.grossProfit || 0).toFixed(2)}</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                    <span style="color: var(--text2);">Gross Loss</span>
                    <span style="color: var(--danger);">$${(stats.grossLoss || 0).toFixed(2)}</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 0;">
                    <span style="color: var(--text2);">Avg Trade</span>
                    <span>$${(stats.avgTrade || 0).toFixed(2)}</span>
                </div>
            `;
            
            // Recent Trades
            const recentContainer = document.getElementById('recentTrades');
            if (recent.length === 0) {
                recentContainer.innerHTML = '<div style="color: var(--text2); text-align: center; padding: 40px;">No trades yet</div>';
            } else {
                recentContainer.innerHTML = recent.slice(0, 10).map(t => `
                    <div class="trade-item">
                        <div class="pair">${t.pair}</div>
                        <div class="dir ${(t.direction||'').toLowerCase()}">${t.direction || 'LONG'}</div>
                        <div class="prices">
                            Entry: <span>$${t.entryPrice?.toFixed(2)}</span> | Exit: <span>${t.exitPrice ? '$'+t.exitPrice.toFixed(2) : '--'}</span>
                        </div>
                        <div class="pnl ${(t.pnlAmount || 0) >= 0 ? 'win' : 'loss'}">
                            ${(t.pnlAmount || 0) >= 0 ? '+' : ''}$${(t.pnlAmount || 0).toFixed(2)}
                        </div>
                        <div class="result ${t.outcome === 'WIN' ? 'win' : 'loss'}">${t.outcome || '???'}</div>
                    </div>
                `).join('');
            }
            
            // Chart
            updateChart(history);
        }
        
        function updateChart(history) {
            const ctx = document.getElementById('chart').getContext('2d');
            const labels = history.map(h => h.time?.slice(11, 16) || '');
            const values = history.map(h => h.balance);
            
            if (chart) {
                chart.data.labels = labels;
                chart.data.datasets[0].data = values;
                chart.update();
            } else {
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            borderColor: '#f7931a',
                            backgroundColor: 'rgba(247, 147, 26, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8b9e', callback: v => '$' + v } },
                            x: { grid: { display: false }, ticks: { color: '#8b8b9e' } }
                        }
                    }
                });
            }
        }
        
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
