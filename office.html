<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Office - Bearded Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --card: #1a1a24;
            --accent: #f7931a; --success: #00d26a; --danger: #ff4757;
            --text: #fff; --text2: #8b8b9e; --border: rgba(255,255,255,0.08);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        nav {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(10,10,15,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 8px; z-index: 100;
        }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); margin-right: 20px; white-space: nowrap; }
        nav select {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 10px 16px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; flex: 1; max-width: 300px;
        }
        nav select:focus { outline: none; border-color: var(--accent); }
        
        main { padding: 80px 20px 40px; max-width: 900px; margin: 0 auto; }
        
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; margin-bottom: 20px;
        }
        
        h2 { font-size: 1rem; color: var(--text2); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Isometric Scene */
        .iso-scene {
            background: linear-gradient(180deg, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            position: relative;
            overflow: hidden;
        }
        
        .iso-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%);
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
        }
        
        /* Isometric Room Container */
        .iso-room {
            position: relative;
            width: 500px;
            height: 350px;
            transform-style: preserve-3d;
        }
        
        /* Floor - isometric diamond */
        .iso-floor-plane {
            position: absolute;
            width: 300px;
            height: 200px;
            background: linear-gradient(135deg, #5a5a7a 0%, #4a4a6a 50%, #3a3a5a 100%);
            transform: rotateX(60deg) rotateZ(45deg);
            bottom: 40px;
            left: 100px;
            border: 2px solid #6a6a8a;
        }
        
        /* Back Left Wall */
        .iso-wall-left {
            position: absolute;
            width: 150px;
            height: 180px;
            background: linear-gradient(180deg, #6a5a7a 0%, #5a4a6a 100%);
            transform: skewY(-30deg);
            bottom: 180px;
            left: 80px;
            border: 2px solid #7a6a8a;
        }
        
        /* Back Right Wall */
        .iso-wall-right {
            position: absolute;
            width: 200px;
            height: 180px;
            background: linear-gradient(180deg, #7a6a8a 0%, #6a5a7a 100%);
            transform: skewY(30deg);
            bottom: 180px;
            right: 80px;
            border: 2px solid #8a7a9a;
        }
        
        /* Window on right wall */
        .iso-window {
            position: absolute;
            width: 80px;
            height: 60px;
            background: linear-gradient(180deg, #8ab4d4 0%, #aac4e4 100%);
            border: 4px solid #5a4a5a;
            bottom: 220px;
            right: 120px;
        }
        .iso-window::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: #5a4a5a;
        }
        .iso-window::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #5a4a5a;
        }
        
        /* Clock on wall */
        .iso-clock {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            border: 3px solid #5a4a5a;
            bottom: 300px;
            left: 150px;
        }
        .iso-clock::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 10px;
            background: #333;
            transform-origin: bottom;
            transform: translate(-50%, -100%) rotate(30deg);
        }
        .iso-clock::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 8px;
            background: #333;
            transform-origin: bottom;
            transform: translate(-50%, -100%) rotate(-60deg);
        }
        
        /* Desk 1 - Dave */
        .iso-desk1 {
            position: absolute;
            bottom: 80px;
            left: 120px;
        }
        
        .iso-desk-top {
            width: 100px;
            height: 60px;
            background: linear-gradient(135deg, #8a6a5a 0%, #7a5a4a 100%);
            transform: rotateX(60deg) rotateZ(-15deg);
            border: 2px solid #9a7a6a;
        }
        
        .iso-desk-leg1 {
            position: absolute;
            width: 8px;
            height: 50px;
            background: #5a4a3a;
            bottom: -40px;
            left: 10px;
            transform: rotateZ(-15deg);
        }
        
        .iso-desk-leg2 {
            position: absolute;
            width: 8px;
            height: 50px;
            background: #5a4a3a;
            bottom: -40px;
            right: 10px;
            transform: rotateZ(-15deg);
        }
        
        /* Monitor on desk 1 */
        .iso-monitor1 {
            position: absolute;
            width: 50px;
            height: 40px;
            background: #2a2a3a;
            border: 3px solid #4a4a5a;
            border-radius: 4px;
            bottom: 70px;
            left: 145px;
            transform: rotateZ(-15deg);
        }
        .iso-monitor1::before {
            content: '📊';
            position: absolute;
            font-size: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .iso-monitor1::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 8px;
            background: #4a4a5a;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* Chair 1 */
        .iso-chair1 {
            position: absolute;
            bottom: 20px;
            left: 130px;
        }
        .iso-chair-back {
            width: 40px;
            height: 50px;
            background: linear-gradient(180deg, #5a7a8a 0%, #4a6a7a 100%);
            border-radius: 8px 8px 0 0;
            transform: rotateZ(-15deg);
        }
        .iso-chair-seat {
            width: 40px;
            height: 15px;
            background: #4a6a7a;
            border-radius: 0 0 4px 4px;
            transform: rotateZ(-15deg);
            margin-top: -2px;
        }
        
        /* Person 1 - Dave (Purple shirt) */
        .iso-person1 {
            position: absolute;
            bottom: 55px;
            left: 140px;
        }
        .iso-person-body1 {
            width: 30px;
            height: 40px;
            background: linear-gradient(180deg, #6c5ce7 0%, #5a4ac7 100%);
            border-radius: 6px 6px 2px 2px;
            transform: rotateZ(-15deg);
        }
        .iso-person-head1 {
            width: 24px;
            height: 24px;
            background: #f0d0b0;
            border-radius: 50%;
            position: absolute;
            top: -20px;
            left: 3px;
            transform: rotateZ(-15deg);
        }
        .iso-person-eye1 {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #333;
            border-radius: 50%;
            top: 8px;
            left: 6px;
        }
        .iso-person-eye2 {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #333;
            border-radius: 50%;
            top: 8px;
            right: 6px;
        }
        
        /* Desk 2 - Right side */
        .iso-desk2 {
            position: absolute;
            bottom: 100px;
            right: 140px;
        }
        
        /* Monitor on desk 2 */
        .iso-monitor2 {
            position: absolute;
            width: 45px;
            height: 35px;
            background: #2a2a3a;
            border: 3px solid #4a4a5a;
            border-radius: 4px;
            bottom: 80px;
            right: 155px;
            transform: rotateZ(15deg);
        }
        .iso-monitor2::before {
            content: '💻';
            position: absolute;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .iso-monitor2::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 8px;
            background: #4a4a5a;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* Chair 2 */
        .iso-chair2 {
            position: absolute;
            bottom: 50px;
            right: 150px;
        }
        .iso-chair-back2 {
            width: 35px;
            height: 45px;
            background: linear-gradient(180deg, #8a6a5a 0%, #7a5a4a 100%);
            border-radius: 8px 8px 0 0;
            transform: rotateZ(15deg);
        }
        .iso-chair-seat2 {
            width: 35px;
            height: 12px;
            background: #7a5a4a;
            border-radius: 0 0 4px 4px;
            transform: rotateZ(15deg);
            margin-top: -2px;
        }
        
        /* Person 2 - Orange shirt */
        .iso-person2 {
            position: absolute;
            bottom: 75px;
            right: 155px;
        }
        .iso-person-body2 {
            width: 28px;
            height: 38px;
            background: linear-gradient(180deg, #f7931a 0%, #d97a10 100%);
            border-radius: 6px 6px 2px 2px;
            transform: rotateZ(15deg);
        }
        .iso-person-head2 {
            width: 22px;
            height: 22px;
            background: #f0d0b0;
            border-radius: 50%;
            position: absolute;
            top: -18px;
            left: 3px;
            transform: rotateZ(15deg);
        }
        .iso-person-eye3 {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #333;
            border-radius: 50%;
            top: 7px;
            left: 5px;
        }
        .iso-person-eye4 {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #333;
            border-radius: 50%;
            top: 7px;
            right: 5px;
        }
        
        /* Bookshelf */
        .iso-bookshelf {
            position: absolute;
            bottom: 180px;
            left: 100px;
            width: 60px;
            height: 100px;
            background: linear-gradient(180deg, #6a5a4a 0%, #5a4a3a 100%);
            border: 2px solid #7a6a5a;
        }
        .iso-book {
            position: absolute;
            width: 10px;
            height: 25px;
            border-radius: 2px;
        }
        .iso-book:nth-child(1) { background: #e74c3c; left: 8px; top: 10px; }
        .iso-book:nth-child(2) { background: #3498db; left: 20px; top: 10px; }
        .iso-book:nth-child(3) { background: #2ecc71; left: 32px; top: 10px; }
        .iso-book:nth-child(4) { background: #f39c12; left: 44px; top: 10px; }
        .iso-book:nth-child(5) { background: #9b59b6; left: 8px; top: 40px; }
        .iso-book:nth-child(6) { background: #1abc9c; left: 20px; top: 40px; }
        
        /* Plant */
        .iso-plant {
            position: absolute;
            bottom: 180px;
            right: 100px;
        }
        .iso-pot {
            width: 30px;
            height: 25px;
            background: linear-gradient(180deg, #c0392b 0%, #a93226 100%);
            border-radius: 0 0 8px 8px;
        }
        .iso-leaves {
            position: absolute;
            bottom: 20px;
            left: 5px;
        }
        .iso-leaf {
            position: absolute;
            width: 20px;
            height: 30px;
            background: #27ae60;
            border-radius: 50% 50% 50% 50%;
        }
        .iso-leaf:nth-child(1) { transform: rotate(-30deg); }
        .iso-leaf:nth-child(2) { transform: rotate(0deg); left: 5px; }
        .iso-leaf:nth-child(3) { transform: rotate(30deg); left: 10px; }
        
        /* Coffee Cup */
        .iso-coffee {
            position: absolute;
            bottom: 140px;
            left: 200px;
            font-size: 20px;
        }
        
        /* Status Bar */
        .status-bar {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .status-item {
            background: var(--bg2);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .status-icon.active { background: rgba(0,210,106,0.2); }
        .status-icon.working { background: rgba(247,147,26,0.2); }
        .status-text h4 { font-size: 0.9rem; margin-bottom: 2px; }
        .status-text p { font-size: 0.8rem; color: var(--text2); }
        
        footer { text-align: center; padding: 30px; color: var(--text2); font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🧔 Bearded Team</span>
        <select onchange="location.href=this.value">
            <option value="index.html">📊 Home</option>
            <option value="trading.html">📈 Trading</option>
            <option value="history.html">📋 History</option>
            <option value="office.html" selected>🏢 Live Office</option>
            <option value="strategy.html">📚 Strategy</option>
        </select>
    </nav>
    
    <main>
        <div class="card">
            <h2>🏢 Isometric Office</h2>
            
            <div class="iso-scene">
                <!-- Floor -->
                <div class="iso-floor-plane"></div>
                
                <!-- Left Wall -->
                <div class="iso-wall-left"></div>
                
                <!-- Right Wall -->
                <div class="iso-wall-right"></div>
                
                <!-- Window -->
                <div class="iso-window"></div>
                
                <!-- Clock -->
                <div class="iso-clock"></div>
                
                <!-- Bookshelf with books -->
                <div class="iso-bookshelf">
                    <div class="iso-book"></div>
                    <div class="iso-book"></div>
                    <div class="iso-book"></div>
                    <div class="iso-book"></div>
                    <div class="iso-book"></div>
                    <div class="iso-book"></div>
                </div>
                
                <!-- Plant -->
                <div class="iso-plant">
                    <div class="iso-leaves">
                        <div class="iso-leaf"></div>
                        <div class="iso-leaf"></div>
                        <div class="iso-leaf"></div>
                    </div>
                    <div class="iso-pot"></div>
                </div>
                
                <!-- Desk 1 with Monitor -->
                <div class="iso-desk1">
                    <div class="iso-monitor1"></div>
                    <div class="iso-desk-top"></div>
                    <div class="iso-desk-leg1"></div>
                    <div class="iso-desk-leg2"></div>
                </div>
                
                <!-- Chair 1 -->
                <div class="iso-chair1">
                    <div class="iso-chair-back"></div>
                    <div class="iso-chair-seat"></div>
                </div>
                
                <!-- Person 1 - Dave -->
                <div class="iso-person1">
                    <div class="iso-person-head1">
                        <div class="iso-person-eye1"></div>
                        <div class="iso-person-eye2"></div>
                    </div>
                    <div class="iso-person-body1"></div>
                </div>
                
                <!-- Desk 2 with Monitor -->
                <div class="iso-desk2">
                    <div class="iso-monitor2"></div>
                </div>
                
                <!-- Chair 2 -->
                <div class="iso-chair2">
                    <div class="iso-chair-back2"></div>
                    <div class="iso-chair-seat2"></div>
                </div>
                
                <!-- Person 2 -->
                <div class="iso-person2">
                    <div class="iso-person-head2">
                        <div class="iso-person-eye3"></div>
                        <div class="iso-person-eye4"></div>
                    </div>
                    <div class="iso-person-body2"></div>
                </div>
                
                <!-- Coffee -->
                <div class="iso-coffee">☕</div>
            </div>
            
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-icon active">🧔</div>
                    <div class="status-text">
                        <h4>Dave</h4>
                        <p>Monitoring systems</p>
                    </div>
                </div>
                <div class="status-item">
                    <div class="status-icon active">📊</div>
                    <div class="status-text">
                        <h4>MSS Trader</h4>
                        <p>Ready for tomorrow</p>
                    </div>
                </div>
                <div class="status-item">
                    <div class="status-icon working">💻</div>
                    <div class="status-text">
                        <h4>Scanner</h4>
                        <p>Markets analysis</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        🧔 Bearded Team HQ • Isometric Office
    </footer>
</body>
</html>
