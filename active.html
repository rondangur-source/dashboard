<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Trades - Bearded Trader</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --card: #1a1a24;
            --accent: #f7931a;
            --success: #00d26a;
            --danger: #ff4757;
            --text: #fff;
            --text2: #8b8b9e;
            --border: rgba(255,255,255,0.08);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        nav {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 30px; gap: 30px; z-index: 100;
        }
        nav a { color: var(--text2); text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; }
        nav a:hover { color: var(--text); background: var(--card); }
        nav a.active { color: var(--text); background: var(--accent); }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
        .live-badge { display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: rgba(0,210,106,0.15); border-radius: 50px; font-size: 0.8rem; margin-left: auto; }
        .live-badge .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        main { padding: 80px 30px 30px; max-width: 900px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 24px; }
        .trade-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 28px; margin-bottom: 16px;
        }
        .trade-card .header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .trade-card .pair { font-size: 1.3rem; font-weight: 700; }
        .trade-card .dir { padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
        .trade-card .dir.long { background: rgba(0,210,106,0.2); color: var(--success); }
        .trade-card .dir.short { background: rgba(255,71,87,0.2); color: var(--danger); }
        .trade-card .entry { color: var(--text2); font-size: 0.85rem; margin-left: auto; }
        .trade-card .entry span { color: var(--accent); font-weight: 600; }
        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .trade-stat { text-align: center; padding: 16px; background: var(--bg2); border-radius: 12px; }
        .trade-stat .value { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
        .trade-stat .value.green { color: var(--success); }
        .trade-stat .value.red { color: var(--danger); }
        .trade-stat .label { color: var(--text2); font-size: 0.75rem; text-transform: uppercase; }
        .progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin: 20px 0 8px; }
        .progress-bar .fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .progress-bar .fill.profit { background: linear-gradient(90deg, var(--success), #00ff88); }
        .progress-bar .fill.loss { background: linear-gradient(90deg, var(--danger), #ff6b7a); }
        .progress-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text2); }
        footer { text-align: center; padding: 30px; color: var(--text2); font-size: 0.8rem; }
        @media (max-width: 700px) { .trade-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🧔 Bearded Trader</span>
        <a href="index.html">Dashboard</a>
        <a href="active.html" class="active">Active Trades</a>
        <a href="history.html">History</a>
        <div class="live-badge"><span class="dot"></span>LIVE</div>
    </nav>
    <main>
        <h1>⚡ Active Trades</h1>
        <div id="activeTrades">
            <div style="text-align: center; padding: 60px; color: var(--text2);">Loading...</div>
        </div>
    </main>
    <footer>🧔 Bearded Trader v6 • Updating every 30 seconds</footer>
    <script>
        const GIST_URL = 'https://gist.githubusercontent.com/rondangur-source/c750c53b60430cd38cc5793c9efd0e7e/raw/dashboard-data.json?t=' + Date.now();
        async function load() {
            try {
                const res = await fetch(GIST_URL);
                const data = await res.json();
                renderActive(data.activeTrades || []);
            } catch (e) { console.error(e); }
        }
        function renderActive(trades) {
            const container = document.getElementById('activeTrades');
            if (trades.length === 0) {
                container.innerHTML = '<div class="trade-card"><div style="text-align: center; padding: 40px; color: var(--text2);">No active trades right now</div></div>';
                return;
            }
            container.innerHTML = trades.map(t => `
                <div class="trade-card">
                    <div class="header">
                        <div class="pair">${t.pair}</div>
                        <div class="dir ${(t.direction||'').toLowerCase()}">${t.direction || 'LONG'}</div>
                        <div class="entry">Entry: <span>$${t.entryPrice?.toFixed(2)}</span></div>
                    </div>
                    <div class="trade-grid">
                        <div class="trade-stat">
                            <div class="value" style="color: var(--danger);">$${t.stopLoss?.toFixed(2)}</div>
                            <div class="label">Stop Loss</div>
                        </div>
                        <div class="trade-stat">
                            <div class="value" style="color: var(--success);">$${t.takeProfit?.toFixed(2)}</div>
                            <div class="label">Take Profit</div>
                        </div>
                        <div class="trade-stat">
                            <div class="value">$${t.atr?.toFixed(2)}</div>
                            <div class="label">ATR (${t.atrMultiplier || 1.5}x)</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="fill" style="width: 0%; background: var(--bg2);"></div>
                    </div>
                    <div class="progress-labels">
                        <span>SL: $${t.stopLoss?.toFixed(2)}</span>
                        <span>Entry: $${t.entryPrice?.toFixed(2)}</span>
                        <span>TP: $${t.takeProfit?.toFixed(2)}</span>
                    </div>
                </div>
            `).join('');
        }
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
