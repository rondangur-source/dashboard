<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Bearded Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --bg2: #12121a; --card: #1a1a24;
            --accent: #f7931a; --success: #00d26a; --danger: #ff4757;
            --text: #fff; --text2: #8b8b9e; --border: rgba(255,255,255,0.08);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        nav {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(10,10,15,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 8px; z-index: 100;
        }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); margin-right: 20px; white-space: nowrap; }
        nav select {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 10px 16px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; flex: 1; max-width: 300px;
        }
        nav select:focus { outline: none; border-color: var(--accent); }
        
        main { padding: 80px 20px 40px; max-width: 1000px; margin: 0 auto; }
        
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; margin-bottom: 20px;
        }
        
        .stats-row {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px;
        }
        @media (min-width: 600px) { .stats-row { grid-template-columns: repeat(4, 1fr); } }
        
        .stat-box {
            background: var(--bg2); border-radius: 12px; padding: 20px; text-align: center;
        }
        .stat-box .value { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .stat-box .value.green { color: var(--success); }
        .stat-box .value.red { color: var(--danger); }
        .stat-box .label { color: var(--text2); font-size: 0.8rem; text-transform: uppercase; }
        
        .trade-item {
            display: flex; align-items: center; gap: 12px;
            padding: 16px; background: var(--bg2);
            border-radius: 12px; margin-bottom: 10px;
        }
        @media (max-width: 500px) {
            .trade-item { flex-wrap: wrap; }
            .trade-item .pnl { margin-left: auto; }
        }
        
        .trade-num { color: var(--text2); font-size: 0.85rem; min-width: 30px; }
        .trade-pair { font-weight: 600; min-width: 90px; }
        .trade-dir {
            padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
        }
        .trade-dir.long { background: rgba(0,210,106,0.2); color: var(--success); }
        .trade-dir.short { background: rgba(255,71,87,0.2); color: var(--danger); }
        
        .trade-prices {
            flex: 1; font-size: 0.85rem; color: var(--text2);
        }
        .trade-prices span { color: var(--text); }
        
        .trade-pnl { font-weight: 700; font-size: 1rem; min-width: 80px; text-align: right; }
        .trade-pnl.win { color: var(--success); }
        .trade-pnl.loss { color: var(--danger); }
        
        .trade-result {
            padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
        }
        .trade-result.win { background: rgba(0,210,106,0.2); color: var(--success); }
        .trade-result.loss { background: rgba(255,71,87,0.2); color: var(--danger); }
        
        .no-trades {
            text-align: center; padding: 60px 20px; color: var(--text2);
        }
        
        footer { text-align: center; padding: 30px; color: var(--text2); font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🧔 Bearded Team</span>
        <select onchange="location.href=this.value">
            <option value="index.html">📊 Home</option>
            <option value="trading.html">📈 Trading</option>
            <option value="history.html" selected>📋 History</option>
            <option value="office.html">🏢 Live Office</option>
            <option value="strategy.html">📚 Strategy</option>
        </select>
    </nav>
    
    <main>
        <div class="card">
            <h2 style="font-size: 1rem; color: var(--text2); margin-bottom: 16px; text-transform: uppercase;">📊 Summary</h2>
            <div class="stats-row" id="stats">
                <div class="stat-box">
                    <div class="value" id="balance">$100.00</div>
                    <div class="label">Balance</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="wr">--%</div>
                    <div class="label">Win Rate</div>
                </div>
                <div class="stat-box">
                    <div class="value green" id="wins">0</div>
                    <div class="label">Wins</div>
                </div>
                <div class="stat-box">
                    <div class="value red" id="losses">0</div>
                    <div class="label">Losses</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2 style="font-size: 1rem; color: var(--text2); margin-bottom: 16px; text-transform: uppercase;">📋 All Trades</h2>
            <div id="trades">
                <div class="no-trades">No trades yet</div>
            </div>
        </div>
    </main>
    
    <footer>
        🧔 Bearded Team • Trade History
    </footer>
    
    <script>
        const GIST_URL = 'https://gist.githubusercontent.com/rondangur-source/c750c53b60430cd38cc5793c9efd0e7e/raw/dashboard-data.json?t=' + Date.now();
        
        async function load() {
            try {
                const res = await fetch(GIST_URL);
                const data = await res.json();
                updateUI(data);
            } catch (e) { console.error(e); }
        }
        
        function updateUI(data) {
            const stats = data.stats || {};
            const recent = data.recentTrades || [];
            
            document.getElementById('balance').textContent = '$' + (stats.balance || 100).toFixed(2);
            document.getElementById('wr').textContent = (stats.winRate || 0) + '%';
            document.getElementById('wins').textContent = stats.wins || 0;
            document.getElementById('losses').textContent = stats.losses || 0;
            
            const container = document.getElementById('trades');
            if (recent.length === 0) {
                container.innerHTML = '<div class="no-trades">No trades yet</div>';
                return;
            }
            
            container.innerHTML = recent.map((t, i) => `
                <div class="trade-item">
                    <div class="trade-num">#${i + 1}</div>
                    <div class="trade-pair">${t.pair}</div>
                    <div class="trade-dir ${(t.direction||'').toLowerCase()}">${t.direction || 'LONG'}</div>
                    <div class="trade-prices">
                        Entry: <span>$${t.entryPrice?.toFixed(2)}</span>
                    </div>
                    <div class="trade-pnl ${(t.pnlAmount || 0) >= 0 ? 'win' : 'loss'}">
                        ${(t.pnlAmount || 0) >= 0 ? '+' : ''}$${(t.pnlAmount || 0).toFixed(2)}
                    </div>
                    <div class="trade-result ${t.outcome === 'WIN' ? 'win' : 'loss'}">
                        ${t.outcome === 'WIN' ? 'WIN' : 'LOSS'}
                    </div>
                </div>
            `).join('');
        }
        
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
