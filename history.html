<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade History - Bearded Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --card: #1a1a24;
            --accent: #f7931a;
            --success: #00d26a;
            --danger: #ff4757;
            --text: #fff;
            --text2: #8b8b9e;
            --border: rgba(255,255,255,0.08);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        nav {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 30px; gap: 30px; z-index: 100;
        }
        nav a { color: var(--text2); text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; }
        nav a:hover { color: var(--text); background: var(--card); }
        nav a.active { color: var(--text); background: var(--accent); }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); }
        .live-badge { display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: rgba(0,210,106,0.15); border-radius: 50px; font-size: 0.8rem; margin-left: auto; }
        .live-badge .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        main { padding: 80px 30px 30px; max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 24px; }
        .summary {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
        }
        .summary-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; text-align: center;
        }
        .summary-card .value { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
        .summary-card .value.green { color: var(--success); }
        .summary-card .value.red { color: var(--danger); }
        .summary-card .label { color: var(--text2); font-size: 0.75rem; text-transform: uppercase; }
        .trade-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 16px;
        }
        .trade-item .num { color: var(--text2); font-size: 0.85rem; min-width: 30px; }
        .trade-item .pair { font-weight: 600; min-width: 100px; font-size: 1rem; }
        .trade-item .dir { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .trade-item .dir.long { background: rgba(0,210,106,0.2); color: var(--success); }
        .trade-item .dir.short { background: rgba(255,71,87,0.2); color: var(--danger); }
        .trade-item .prices { flex: 1; font-size: 0.85rem; color: var(--text2); }
        .trade-item .prices span { color: var(--text); }
        .trade-item .pnl { font-weight: 700; font-size: 1.1rem; min-width: 80px; text-align: right; }
        .trade-item .pnl.win { color: var(--success); }
        .trade-item .pnl.loss { color: var(--danger); }
        .trade-item .result { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .trade-item .result.win { background: rgba(0,210,106,0.2); color: var(--success); }
        .trade-item .result.loss { background: rgba(255,71,87,0.2); color: var(--danger); }
        footer { text-align: center; padding: 30px; color: var(--text2); font-size: 0.8rem; }
        @media (max-width: 700px) {
            .summary { grid-template-columns: repeat(2, 1fr); }
            .trade-item { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🧔 Bearded Trader</span>
        <a href="index.html">Dashboard</a>
        <a href="active.html">Active Trades</a>
        <a href="history.html" class="active">History</a>
        <div class="live-badge"><span class="dot"></span>LIVE</div>
    </nav>
    <main>
        <h1>📋 Trade History</h1>
        <div class="summary" id="summary">
            <div class="summary-card">
                <div class="value" id="balance">$100.00</div>
                <div class="label">Balance</div>
            </div>
            <div class="summary-card">
                <div class="value" id="wr">--%</div>
                <div class="label">Win Rate</div>
            </div>
            <div class="summary-card">
                <div class="value" id="wins">0</div>
                <div class="label">Wins</div>
            </div>
            <div class="summary-card">
                <div class="value" id="losses">0</div>
                <div class="label">Losses</div>
            </div>
        </div>
        <div id="trades">
            <div style="text-align: center; padding: 60px; color: var(--text2);">Loading...</div>
        </div>
    </main>
    <footer>🧔 Bearded Trader v6 • Updating every 30 seconds</footer>
    <script>
        const GIST_URL = 'https://gist.githubusercontent.com/rondangur-source/c750c53b60430cd38cc5793c9efd0e7e/raw/dashboard-data.json?t=' + Date.now();
        async function load() {
            try {
                const res = await fetch(GIST_URL);
                const data = await res.json();
                update(data);
            } catch (e) { console.error(e); }
        }
        function update(data) {
            const stats = data.stats || {};
            const recent = data.recentTrades || [];
            document.getElementById('balance').textContent = '$' + (stats.balance || 100).toFixed(2);
            document.getElementById('wr').textContent = (stats.winRate || 0) + '%';
            document.getElementById('wins').textContent = stats.wins || 0;
            document.getElementById('losses').textContent = stats.losses || 0;
            const container = document.getElementById('trades');
            if (recent.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text2);">No trades yet</div>';
                return;
            }
            container.innerHTML = recent.map((t, i) => `
                <div class="trade-item">
                    <div class="num">#${i + 1}</div>
                    <div class="pair">${t.pair}</div>
                    <div class="dir ${(t.direction||'').toLowerCase()}">${t.direction || 'LONG'}</div>
                    <div class="prices">
                        Entry: <span>$${t.entryPrice?.toFixed(2)}</span> | 
                        Exit: <span>${t.exitPrice ? '$'+t.exitPrice.toFixed(2) : '--'}</span>
                    </div>
                    <div class="pnl ${(t.pnlAmount || 0) >= 0 ? 'win' : 'loss'}">
                        ${(t.pnlAmount || 0) >= 0 ? '+' : ''}$${(t.pnlAmount || 0).toFixed(2)}
                    </div>
                    <div class="result ${t.outcome === 'WIN' ? 'win' : 'loss'}">${t.outcome || '???'}</div>
                </div>
            `).join('');
        }
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
