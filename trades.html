<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trades - Team Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #8b8b9e;
            --success: #00d26a;
            --danger: #ff4757;
            --warning: #ffc107;
            --border: rgba(255,255,255,0.08);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 210, 106, 0.05) 0%, transparent 50%);
            z-index: -1;
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
        }
        
        .nav-logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links { display: flex; gap: 8px; }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .nav-links a:hover { color: var(--text-primary); background: var(--bg-card); }
        .nav-links a.active { color: var(--text-primary); background: var(--accent); }
        
        main { padding: 100px 40px 40px; max-width: 1400px; margin: 0 auto; }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .page-header h1 { font-size: 2.5rem; font-weight: 700; }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        
        .stat-box .value { font-size: 2rem; font-weight: 700; margin-bottom: 6px; }
        .stat-box .label { color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-box .value.green { color: var(--success); }
        .stat-box .value.red { color: var(--danger); }
        .stat-box .value.purple { color: var(--accent); }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
        }
        
        .trades-table-container { overflow-x: auto; }
        
        .trades-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        
        .trades-table th {
            text-align: left;
            padding: 16px 20px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 10px 10px 0 0;
        }
        
        .trades-table td { padding: 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .trades-table tbody tr:hover { background: rgba(108, 92, 231, 0.08); }
        
        .dir-tag { display: inline-block; padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; }
        .dir-tag.long { background: rgba(0, 210, 106, 0.15); color: var(--success); }
        .dir-tag.short { background: rgba(255, 71, 87, 0.15); color: var(--danger); }
        
        .result-tag { display: inline-block; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
        .result-tag.win { background: rgba(0, 210, 106, 0.15); color: var(--success); }
        .result-tag.loss { background: rgba(255, 71, 87, 0.15); color: var(--danger); }
        
        .pnl-value { font-weight: 700; font-size: 1.05rem; }
        .pnl-value.positive { color: var(--success); }
        .pnl-value.negative { color: var(--danger); }
        
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
        .empty-state h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text-primary); }
        
        .last-update { text-align: right; font-size: 0.8rem; color: var(--text-secondary); margin-top: 20px; }
        
        footer { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 0.85rem; }
        
        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            main { padding: 90px 20px 20px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">TeamFlow</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="bearded-trader.html">Bearded Trader</a>
            <a href="trades.html" class="active">Trades</a>
        </div>
    </nav>
    
    <main>
        <div class="page-header">
            <h1>📋 Trade History</h1>
        </div>
        
        <div class="stats-row">
            <div class="stat-box">
                <div class="value" id="totalTrades">0</div>
                <div class="label">Total Trades</div>
            </div>
            <div class="stat-box">
                <div class="value green" id="winRate">0%</div>
                <div class="label">Win Rate</div>
            </div>
            <div class="stat-box">
                <div class="value purple" id="totalPnL">$0</div>
                <div class="label">Total PnL</div>
            </div>
            <div class="stat-box">
                <div class="value" id="avgTrade">--</div>
                <div class="label">Avg Trade</div>
            </div>
        </div>
        
        <div class="card">
            <div class="trades-table-container">
                <table class="trades-table">
                    <thead>
                        <tr>
                            <th>#</th><th>Date & Time</th><th>Pair</th><th>Direction</th>
                            <th>Entry Price</th><th>Exit Price</th><th>ATR</th><th>PnL</th><th>Result</th>
                        </tr>
                    </thead>
                    <tbody id="tradesBody">
                        <tr><td colspan="9"><div class="empty-state"><div class="icon">🎯</div><h3>No Trades Yet</h3><p>Loading...</p></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="last-update" id="lastUpdate">Loading...</div>
    </main>
    
    <footer>
        TeamFlow Dashboard • Trade History • <span style="color: var(--accent);">Live Data</span>
    </footer>
    
    <script>
        const GIST_URL = 'https://gist.githubusercontent.com/rondangur-source/c750c53b60430cd38cc5793c9efd0e7e/raw/dashboard-data.json';
        
        async function loadTrades() {
            try {
                const response = await fetch(GIST_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to fetch');
                
                const data = await response.json();
                updateUI(data);
            } catch (err) {
                console.error('Error loading trades:', err);
            }
        }
        
        function updateUI(data) {
            const stats = data.stats || {};
            const trades = data.recentTrades || [];
            
            document.getElementById('totalTrades').textContent = stats.totalTrades || 0;
            document.getElementById('winRate').textContent = (stats.winRate || 0) + '%';
            document.getElementById('totalPnL').textContent = '$' + (stats.totalPnL || 0).toFixed(2);
            document.getElementById('totalPnL').className = stats.totalPnL >= 0 ? 'value green' : 'value red';
            document.getElementById('avgTrade').textContent = stats.avgTrade ? '$' + stats.avgTrade.toFixed(2) : '--';
            
            const tbody = document.getElementById('tradesBody');
            
            if (trades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon">🎯</div><h3>No Trades Yet</h3><p>MSS Trader will execute trades when signals are detected.</p></div></td></tr>';
            } else {
                tbody.innerHTML = trades.map((trade, i) => `
                    <tr>
                        <td>#${trade.id || i + 1}</td>
                        <td>${trade.exitTime || trade.entryTime || '--'}</td>
                        <td>${trade.pair || 'BTCUSDT'}</td>
                        <td><span class="dir-tag ${trade.direction?.toLowerCase()}">${trade.direction || '--'}</span></td>
                        <td>${trade.entryPrice ? '$' + trade.entryPrice.toFixed(2) : '--'}</td>
                        <td>${trade.exitPrice ? '$' + trade.exitPrice.toFixed(2) : '--'}</td>
                        <td>${trade.atr ? '$' + trade.atr.toFixed(2) : '--'}</td>
                        <td><span class="pnl-value ${trade.pnl >= 0 ? 'positive' : 'negative'}">${trade.pnl >= 0 ? '+' : ''}$${trade.pnl?.toFixed(2)}</span></td>
                        <td><span class="result-tag ${trade.pnl > 0 ? 'win' : 'loss'}">${trade.pnl > 0 ? 'WIN' : 'LOSS'}</span></td>
                    </tr>
                `).join('');
            }
            
            const updateTime = new Date(data.timestamp);
            document.getElementById('lastUpdate').textContent = 'Last updated: ' + updateTime.toLocaleTimeString() + ' | Source: GitHub Gist';
        }
        
        loadTrades();
        setInterval(loadTrades, 30000);
    </script>
</body>
</html>
